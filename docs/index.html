<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docs</title>

  <!-- CDN deps -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ob: {
              50:  '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0',
              300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b',
              600: '#475569', 700: '#334155', 800: '#1e293b',
              900: '#0f172a', 950: '#020617'
            }
          },
          fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ── scrollbars ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    /* ── markdown prose ── */
    #md-content h1 { font-size: 1.75rem; font-weight: 600; margin: 0 0 1rem; color: #f1f5f9; border-bottom: 1px solid #1e293b; padding-bottom: .6rem; }
    #md-content h2 { font-size: 1.25rem; font-weight: 600; margin: 2rem 0 .75rem; color: #e2e8f0; }
    #md-content h3 { font-size: 1.05rem; font-weight: 500; margin: 1.5rem 0 .5rem; color: #cbd5e1; }
    #md-content p  { margin: 0 0 1rem; color: #94a3b8; line-height: 1.75; }
    #md-content a  { color: #60a5fa; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .2s; }
    #md-content a:hover { border-color: #60a5fa; }
    #md-content ul, #md-content ol { margin: 0 0 1rem 1.5rem; color: #94a3b8; line-height: 1.75; }
    #md-content li { margin-bottom: .25rem; }
    #md-content blockquote { border-left: 3px solid #3b82f6; margin: 1rem 0; padding: .5rem 1rem; background: #0f172a; color: #64748b; border-radius: 0 .25rem .25rem 0; }
    #md-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: .875rem; }
    #md-content th { background: #1e293b; color: #f1f5f9; padding: .5rem 1rem; text-align: left; font-weight: 500; }
    #md-content td { padding: .5rem 1rem; border-bottom: 1px solid #1e293b; color: #94a3b8; }
    #md-content tr:hover td { background: #0f172a; }
    #md-content pre { margin: 1rem 0; border-radius: .5rem; overflow-x: auto; border: 1px solid #1e293b; position: relative; }
    #md-content code:not(pre code) { background: #1e293b; color: #93c5fd; padding: .15rem .4rem; border-radius: .25rem; font-size: .85em; }
    #md-content hr { border: none; border-top: 1px solid #1e293b; margin: 2rem 0; }

    /* ── copy button inside pre ── */
    .copy-btn {
      position: absolute; top: .5rem; right: .5rem;
      background: #334155; border: 1px solid #475569; color: #94a3b8;
      font-size: .7rem; padding: .2rem .5rem; border-radius: .25rem;
      cursor: pointer; opacity: 0; transition: opacity .2s, background .2s;
      font-family: inherit;
    }
    #md-content pre:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: #475569; color: #f1f5f9; }
    .copy-btn.copied { background: #1d4ed8; color: white; border-color: #1d4ed8; }

    /* ── sidebar nav ── */
    .nav-file {
      display: block; padding: .35rem .75rem; border-radius: .25rem;
      color: #64748b; font-size: .8rem; cursor: pointer;
      transition: background .15s, color .15s; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .nav-file:hover { background: #1e293b; color: #e2e8f0; }
    .nav-file.active { background: #1d4ed8; color: #fff; }
    .nav-folder-label {
      display: flex; align-items: center; gap: .4rem;
      padding: .35rem .5rem; border-radius: .25rem;
      color: #475569; font-size: .75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em;
      cursor: pointer; user-select: none; transition: color .15s;
    }
    .nav-folder-label:hover { color: #94a3b8; }
    .nav-folder-children { display: none; padding-left: .75rem; }
    .nav-folder.open > .nav-folder-children { display: block; }
    .nav-folder.open .folder-icon::before { content: '▾'; }
    .folder-icon::before { content: '▸'; font-size: .6rem; }

    /* ── mobile sidebar overlay ── */
    #sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(2,6,23,.7); z-index: 40;
    }
    #sidebar-overlay.active { display: block; }

    /* ── search highlight ── */
    mark { background: #1d4ed820; color: #93c5fd; border-radius: 2px; }

    /* ── loading spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin .8s linear infinite; display: inline-block; }

    /* ── AOS-like fade on content load ── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .fade-up { animation: fadeUp .3s ease both; }
  </style>
</head>

<body class="bg-ob-950 text-ob-100 font-mono min-h-screen" style="overflow: hidden;">

<!-- ══════════════════════════════════════════
     TOP NAV
══════════════════════════════════════════ -->
<nav class="bg-ob-900 border-b border-ob-800 sticky top-0 z-50 h-14 flex items-center px-4 gap-3">

  <!-- Mobile sidebar toggle -->
  <button id="mob-toggle" class="md:hidden p-1.5 rounded text-ob-400 hover:text-white hover:bg-ob-800 transition-colors" aria-label="Menu">
    <i data-feather="menu" width="18"></i>
  </button>

  <!-- Logo -->
  <a href="#" class="flex items-center gap-2 text-white font-semibold text-sm shrink-0">
    <span class="text-blue-400 text-lg">{ }</span>
    <span id="site-title">Docs</span>
  </a>

  <!-- Search -->
  <div class="flex-1 max-w-sm relative ml-2">
    <i data-feather="search" width="14" class="absolute left-2.5 top-1/2 -translate-y-1/2 text-ob-500 pointer-events-none"></i>
    <input id="search-input" type="text" placeholder="Search…"
      class="w-full bg-ob-800 border border-ob-700 rounded pl-8 pr-3 py-1.5 text-xs text-ob-200 placeholder-ob-500 focus:outline-none focus:border-blue-600 transition-colors">
  </div>

  <div class="flex-1"></div>

  <!-- GitHub link -->
  <a id="gh-link" href="#" target="_blank" class="p-1.5 rounded text-ob-400 hover:text-white hover:bg-ob-800 transition-colors" title="GitHub">
    <i data-feather="github" width="18"></i>
  </a>

  <!-- Refresh -->
  <button id="refresh-btn" class="p-1.5 rounded text-ob-400 hover:text-white hover:bg-ob-800 transition-colors" title="Reload navigation">
    <i data-feather="refresh-cw" width="18"></i>
  </button>
</nav>


<!-- ══════════════════════════════════════════
     LAYOUT
══════════════════════════════════════════ -->
<div style="display:flex; height:calc(100vh - 56px); overflow:hidden;">

  <!-- sidebar overlay (mobile) -->
  <div id="sidebar-overlay"></div>

  <!-- ── SIDEBAR ── -->
  <aside id="sidebar"
    class="bg-ob-900 border-r border-ob-800 flex flex-col shrink-0 overflow-hidden transition-all duration-200"
    style="width:240px;">

    <!-- Search results or nav tree -->
    <div id="nav-scroll" class="flex-1 overflow-y-auto overflow-x-hidden py-3 px-2">
      <div id="nav-container">
        <div class="text-ob-600 text-xs px-2 py-6 text-center">
          <span class="spinner">⟳</span> Loading…
        </div>
      </div>
    </div>

    <!-- Sidebar footer -->
    <div class="border-t border-ob-800 px-3 py-2 text-ob-600 text-xs flex items-center justify-between">
      <span id="file-count">—</span>
      <button id="sidebar-collapse"
        class="p-1 rounded hover:bg-ob-800 hover:text-ob-300 transition-colors"
        title="Collapse sidebar">
        <i data-feather="chevrons-left" width="14"></i>
      </button>
    </div>
  </aside>

  <!-- ── CONTENT ── -->
  <main id="content-area" class="flex-1 overflow-y-auto" style="background:#020617;">

    <!-- Breadcrumb -->
    <div id="breadcrumb" class="hidden border-b border-ob-900 px-6 py-2 text-xs text-ob-500 flex items-center gap-1.5 sticky top-0 z-10" style="background:#020617;">
    </div>

    <!-- Markdown output -->
    <div class="px-6 py-8 max-w-3xl mx-auto">
      <div id="md-content" class="fade-up">
        <!-- landing state -->
        <div class="text-center py-20 text-ob-600">
          <div class="text-5xl mb-4 text-ob-700">{ }</div>
          <p class="text-ob-500 text-sm">Select a document from the sidebar.</p>
        </div>
      </div>
    </div>
  </main>
</div>


<!-- ══════════════════════════════════════════
     SCRIPT
══════════════════════════════════════════ -->
<script>
/* ─────────────────────────────────────────
   CONFIG  ← edit these
───────────────────────────────────────── */
const CFG = {
  owner:    'dein-github-username',
  repo:     'dein-repo-name',
  branch:   'main',
  docsPath: 'docs',          // folder with .md files
  navJson:  'docs/nav.json', // generated by GitHub Action
  siteTitle:'Docs',          // shown in top bar
  ghUrl:    '',              // overrides GitHub icon link (leave '' to auto-build)
};

/* ─────────────────────────────────────────
   BOOTSTRAP
───────────────────────────────────────── */
const CACHE_NAV = 'docs-nav-v1';
const CACHE_MD  = {};         // in-memory Markdown cache

document.getElementById('site-title').textContent = CFG.siteTitle;
document.title = CFG.siteTitle;
const ghUrl = CFG.ghUrl || `https://github.com/${CFG.owner}/${CFG.repo}`;
document.getElementById('gh-link').href = ghUrl;

feather.replace();

/* ─────────────────────────────────────────
   HELPERS
───────────────────────────────────────── */
function rawUrl(path) {
  return `https://raw.githubusercontent.com/${CFG.owner}/${CFG.repo}/${CFG.branch}/${path}`;
}

function prettyTitle(name) {
  return name.replace(/\.md$/i, '').replace(/[-_]/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

function setIcon(el, name, size = 18) {
  el.innerHTML = feather.icons[name]?.toSvg({ width: size, height: size }) ?? '';
}

/* ─────────────────────────────────────────
   NAV DATA  (nav.json → cache → API fallback)
───────────────────────────────────────── */
async function loadNav() {
  // 1. Try nav.json first (fastest, no rate-limit)
  try {
    const r = await fetch(rawUrl(CFG.navJson) + '?_=' + Date.now());
    if (r.ok) {
      const data = await r.json();
      localStorage.setItem(CACHE_NAV, JSON.stringify(data));
      return data;
    }
  } catch (_) { /* fall through */ }

  // 2. Try localStorage cache
  try {
    const cached = localStorage.getItem(CACHE_NAV);
    if (cached) return JSON.parse(cached);
  } catch (_) { /* fall through */ }

  // 3. Fallback: GitHub Trees API (1 request, recursive)
  const url = `https://api.github.com/repos/${CFG.owner}/${CFG.repo}/git/trees/${CFG.branch}?recursive=1`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`GitHub API ${r.status}: ${r.statusText}`);
  const { tree } = await r.json();

  const nav = buildTreeFromGitHub(tree);
  localStorage.setItem(CACHE_NAV, JSON.stringify(nav));
  return nav;
}

function buildTreeFromGitHub(tree) {
  const root = [];
  const map  = {}; // path → node

  const docs = tree
    .filter(n => n.path.startsWith(CFG.docsPath + '/'))
    .sort((a, b) => a.path.localeCompare(b.path));

  for (const item of docs) {
    const rel   = item.path.slice(CFG.docsPath.length + 1);
    const parts = rel.split('/');

    if (item.type === 'tree') {
      const node = { type: 'folder', name: parts[parts.length - 1], path: item.path, children: [] };
      map[item.path] = node;
      const parentPath = item.path.split('/').slice(0, -1).join('/');
      (parentPath === CFG.docsPath ? root : (map[parentPath]?.children ?? root)).push(node);
    } else if (item.type === 'blob' && item.path.endsWith('.md')) {
      const name   = parts[parts.length - 1];
      const fileNode = { type: 'file', name, path: item.path, title: prettyTitle(name) };
      const parentPath = item.path.split('/').slice(0, -1).join('/');
      (parentPath === CFG.docsPath ? root : (map[parentPath]?.children ?? root)).push(fileNode);
    }
  }
  return root;
}

/* ─────────────────────────────────────────
   RENDER SIDEBAR
───────────────────────────────────────── */
let allFiles = []; // flat list for search

function renderNav(entries, container, depth = 0) {
  container.innerHTML = '';
  for (const entry of entries) {
    if (entry.type === 'folder') {
      const wrap  = document.createElement('div');
      wrap.className = 'nav-folder';

      const label = document.createElement('div');
      label.className = 'nav-folder-label';
      label.innerHTML = `<span class="folder-icon"></span><span>${entry.name}</span>`;
      label.addEventListener('click', () => wrap.classList.toggle('open'));

      const kids = document.createElement('div');
      kids.className = 'nav-folder-children';
      renderNav(entry.children, kids, depth + 1);

      wrap.appendChild(label);
      wrap.appendChild(kids);
      container.appendChild(wrap);
    } else {
      allFiles.push(entry);
      const el = document.createElement('div');
      el.className = 'nav-file';
      el.textContent = entry.title;
      el.dataset.path = entry.path;
      el.addEventListener('click', () => {
        loadDoc(entry.path, entry.title, el);
        // close mobile sidebar
        if (window.innerWidth < 768) closeMobileSidebar();
      });
      container.appendChild(el);
    }
  }
}

/* ─────────────────────────────────────────
   LOAD + RENDER MARKDOWN
───────────────────────────────────────── */
let activeEl = null;

async function loadDoc(path, title, navEl) {
  // update active state
  if (activeEl) activeEl.classList.remove('active');
  activeEl = navEl;
  navEl?.classList.add('active');

  // breadcrumb
  const bc = document.getElementById('breadcrumb');
  const parts = path.replace(CFG.docsPath + '/', '').split('/');
  bc.classList.remove('hidden');
  bc.innerHTML = parts.map((p, i) =>
    i === parts.length - 1
      ? `<span class="text-ob-300">${prettyTitle(p)}</span>`
      : `<span>${prettyTitle(p)}</span><span class="text-ob-700">/</span>`
  ).join('');

  // update hash for deep-linking
  location.hash = '#' + encodeURIComponent(path);

  // show loading
  const out = document.getElementById('md-content');
  out.innerHTML = `<div class="text-ob-600 text-xs py-10 text-center"><span class="spinner">⟳</span> Loading…</div>`;

  try {
    // check memory cache first
    if (!CACHE_MD[path]) {
      const r = await fetch(rawUrl(path));
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      CACHE_MD[path] = await r.text();
    }

    const html = marked.parse(CACHE_MD[path]);
    out.className = 'fade-up';
    out.innerHTML = html;

    // syntax highlight
    out.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));

    // inject copy buttons
    out.querySelectorAll('pre').forEach(pre => {
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'copy';
      btn.addEventListener('click', async () => {
        const code = pre.querySelector('code')?.innerText ?? '';
        await navigator.clipboard.writeText(code).catch(() => {});
        btn.textContent = 'copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
      });
      pre.style.position = 'relative';
      pre.appendChild(btn);
    });

    // scroll to top of content area
    document.getElementById('content-area').scrollTo({ top: 0, behavior: 'smooth' });
    document.title = `${title} — ${CFG.siteTitle}`;
  } catch (e) {
    out.innerHTML = `<div class="text-red-400 text-sm py-8">
      <strong>Error:</strong> Could not load <code>${path}</code><br>
      <span class="text-ob-500">${e.message}</span>
    </div>`;
  }
}

/* ─────────────────────────────────────────
   SEARCH
───────────────────────────────────────── */
const searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { renderNav(window.__navData, document.getElementById('nav-container')); return; }

  const matches = allFiles.filter(f =>
    f.title.toLowerCase().includes(q) || f.path.toLowerCase().includes(q)
  );

  const container = document.getElementById('nav-container');
  container.innerHTML = '';
  if (!matches.length) {
    container.innerHTML = `<div class="text-ob-600 text-xs px-2 py-4">No results for "${q}"</div>`;
    return;
  }
  matches.forEach(f => {
    const el = document.createElement('div');
    el.className = 'nav-file';
    const re = new RegExp(`(${q})`, 'gi');
    el.innerHTML = f.title.replace(re, '<mark>$1</mark>');
    el.dataset.path = f.path;
    el.addEventListener('click', () => loadDoc(f.path, f.title, el));
    container.appendChild(el);
  });
});

/* ─────────────────────────────────────────
   SIDEBAR COLLAPSE (desktop)
───────────────────────────────────────── */
let sidebarOpen = true;
document.getElementById('sidebar-collapse').addEventListener('click', () => {
  const sb = document.getElementById('sidebar');
  sidebarOpen = !sidebarOpen;
  sb.style.width = sidebarOpen ? '240px' : '0px';
  sb.style.overflow = sidebarOpen ? '' : 'hidden';
});

/* ─────────────────────────────────────────
   MOBILE SIDEBAR
───────────────────────────────────────── */
function openMobileSidebar() {
  const sb = document.getElementById('sidebar');
  sb.style.position = 'fixed';
  sb.style.top = '56px';
  sb.style.left = '0';
  sb.style.height = 'calc(100vh - 56px)';
  sb.style.zIndex = '50';
  sb.style.width = '240px';
  document.getElementById('sidebar-overlay').classList.add('active');
}
function closeMobileSidebar() {
  const sb = document.getElementById('sidebar');
  sb.style.position = '';
  sb.style.top = '';
  sb.style.left = '';
  sb.style.height = '';
  sb.style.zIndex = '';
  document.getElementById('sidebar-overlay').classList.remove('active');
}
document.getElementById('mob-toggle').addEventListener('click', openMobileSidebar);
document.getElementById('sidebar-overlay').addEventListener('click', closeMobileSidebar);

/* ─────────────────────────────────────────
   REFRESH
───────────────────────────────────────── */
document.getElementById('refresh-btn').addEventListener('click', async () => {
  localStorage.removeItem(CACHE_NAV);
  allFiles = [];
  await buildNav();
});

/* ─────────────────────────────────────────
   BOOT
───────────────────────────────────────── */
async function buildNav() {
  const container = document.getElementById('nav-container');
  container.innerHTML = `<div class="text-ob-600 text-xs px-2 py-6 text-center"><span class="spinner">⟳</span> Loading…</div>`;

  try {
    const data = await loadNav();
    window.__navData = data;
    allFiles = [];
    renderNav(data, container);

    // file count
    document.getElementById('file-count').textContent = `${allFiles.length} files`;

    // deep-link or auto-open first file
    const hash = decodeURIComponent(location.hash.slice(1));
    if (hash) {
      const match = allFiles.find(f => f.path === hash);
      if (match) {
        // open parent folders
        const el = container.querySelector(`[data-path="${match.path}"]`);
        if (el) {
          let p = el.parentElement;
          while (p && p !== container) {
            if (p.classList.contains('nav-folder')) p.classList.add('open');
            p = p.parentElement;
          }
          loadDoc(match.path, match.title, el);
        }
      }
    } else {
      const first = container.querySelector('[data-path]');
      if (first) {
        // auto-open first folder if present
        const firstFolder = container.querySelector('.nav-folder');
        if (firstFolder) firstFolder.classList.add('open');
        first.click();
      }
    }
  } catch (err) {
    container.innerHTML = `<div class="text-red-400 text-xs px-2 py-4">
      <strong>Error:</strong> ${err.message}<br>
      <span class="text-ob-500">Check CFG at top of script.</span>
    </div>`;
  }
}

buildNav();
</script>
</body>
</html>
